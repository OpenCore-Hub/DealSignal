openapi: 3.1.0

# =============================================================================
# {产品名} OpenAPI 规范模板 v1
# =============================================================================
# 文档编号：API-SPEC-YYYY-NNN
# 版本：{vX.Y.Z}
# 模板版本：v1
# 状态：草稿 / 评审中 / 已批准
# 编写人：后端架构师 / API 设计师
# 关联文档：
#   - docs/PRD-vX.Y.Z.md
#   - docs/TDD-vX.Y.Z.md
#   - docs/templates/API-SPEC-template-v1.md
# 同步要求：
#   本文件必须与对应的 API-SPEC Markdown 文件（如 docs/API-SPEC-vX.Y.Z.md）
#   保持同步。任何一方修改后，另一方必须同步更新，避免机器可读契约与
#   人工可读描述出现偏差。
# =============================================================================

info:
  title: "{产品名} API"
  description: |
    {产品名} 的 RESTful API 规范。

    ## 认证
    默认用户接口使用 Bearer Token 认证，全局安全要求为 `bearerAuth`：
    ```
    Authorization: Bearer <jwt_token>
    ```
    服务/机器调用或 Webhook 回调验证使用 API Key：
    ```
    X-API-Key: <api_key>
    ```

    ## 路由策略
    - API 默认基路径为 `/api/v1`，例如 `https://api.example.com/api/v1`。
    - Organization / 租户默认不通过 URL path 解析，优先按以下顺序解析当前用户所属 organization：
      1. `Authorization` Token 中的 `oid` / `tid` claim；
      2. 请求头 `X-Organization-Id`；
      3. 子域名 `{organizationSlug}.api.example.com`（可选）。
    - 默认不要把 `organization_id` 或 `{organizationSlug}` 作为**所有接口的租户上下文前缀**。
    - **资源对象路径例外**：`/api/v1/organizations/{organization_id}` 这类接口是对 Organization 资源对象自身的 CRUD，并非租户上下文路径；调用者身份仍由 Token/Header 确定，服务端再校验其对该 organization 的访问权限。
    - 若项目 ADR 决定采用“子域名 + 路径 slug”方案，可作为备选另行约定。

    ## 公开访问
    公开 Public 路径保持 `/public/resources/{resource_id}`，通过签名 token 访问：
    ```
    GET /public/resources/{resource_id}?token=<signed_token>
    ```

    ## 通用响应
    成功响应统一返回 `code: ok`，错误响应返回对应的 `code` 和 `message`。

    ## 分页
    列表接口默认返回 20 条，最大 100 条。支持 `page` 和 `page_size` 参数。

    ## 限流
    普通接口限流 100 次/分钟/用户，上传接口 10 次/分钟/用户。
  version: "1.0.0"
  contact:
    name: "{API 支持团队}"
    email: "api-support@example.com"
    url: "https://developers.example.com"
  license:
    name: "{License 名称}"
    url: "https://example.com/license"

servers:
  - url: "https://api.example.com"
    description: "生产环境"
  - url: "https://api.staging.example.com"
    description: "预发环境"
  - url: "http://localhost:8080"
    description: "本地开发环境"

# =============================================================================
# 安全认证
# =============================================================================
security:
  - bearerAuth: []
  - apiKeyAuth: []

# =============================================================================
# 标签分类
# =============================================================================
tags:
  - name: "Organization"
    description: "Organization 管理"
  - name: "Resource"
    description: "Resource upload, processing, query"
  - name: "Share"
    description: "Shared access 创建与管理"
  - name: "Webhook"
    description: "Webhook 订阅与事件推送"

# =============================================================================
# 路径定义
# =============================================================================
paths:
  # ---------------------------------------------------------------------------
  # Organization
  # ---------------------------------------------------------------------------
  /api/v1/organizations:
    get:
      summary: "列出当前用户的 Organization"
      description: "返回当前用户所属的所有 Organization 列表。"
      operationId: "listOrganizations"
      tags:
        - "Organization"
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
      x-codeSamples:
        - lang: "curl"
          source: |
            curl -X GET "https://api.example.com/api/v1/organizations?page=1&page_size=20" \
              -H "Authorization: Bearer <jwt_token>"
        - lang: "javascript"
          source: |
            const res = await fetch('https://api.example.com/api/v1/organizations?page=1&page_size=20', {
              headers: { Authorization: 'Bearer <jwt_token>' }
            });
            const data = await res.json();
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/RateLimitError"

    post:
      summary: "创建 Organization"
      description: "创建一个新的 Organization，当前用户自动成为 owner。"
      operationId: "createOrganization"
      tags:
        - "Organization"
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: "创建成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /api/v1/organizations/{organization_id}:
    parameters:
      - $ref: "#/components/parameters/OrganizationIdPath"

    get:
      summary: "获取 Organization 详情"
      operationId: "getOrganization"
      tags:
        - "Organization"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/Organization"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    patch:
      summary: "更新 Organization"
      operationId: "updateOrganization"
      tags:
        - "Organization"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

    delete:
      summary: "删除 Organization"
      operationId: "deleteOrganization"
      tags:
        - "Organization"
      responses:
        "204":
          description: "删除成功"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ---------------------------------------------------------------------------
  # Resource
  # ---------------------------------------------------------------------------
  /api/v1/resources:
    get:
      summary: "列出当前 Organization 的资源"
      description: "返回当前 organization 下的资源列表。"
      operationId: "listResources"
      tags:
        - "Resource"
      parameters:
        - name: status
          in: query
          description: "按状态过滤"
          schema:
            type: string
            enum:
              - draft
              - processing
              - active
              - archived
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourcesResponse"

    post:
      summary: "创建资源（上传元数据）"
      description: "在当前 organization 创建资源记录，返回上传 URL。"
      operationId: "createResource"
      tags:
        - "Resource"
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResourceRequest"
      responses:
        "201":
          description: "创建成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ResourceWithUploadURL"

  /api/v1/resources/{resource_id}:
    parameters:
      - $ref: "#/components/parameters/ResourceIdPath"

    get:
      summary: "获取资源详情"
      operationId: "getResource"
      tags:
        - "Resource"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/Resource"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      summary: "删除资源"
      operationId: "deleteResource"
      tags:
        - "Resource"
      responses:
        "204":
          description: "删除成功"

  # ---------------------------------------------------------------------------
  # 公开访问（Signed URL）
  # ---------------------------------------------------------------------------
  /public/resources/{resource_id}:
    get:
      summary: "通过签名 URL 查看资源"
      description: "无需认证，通过签名 token 访问公开资源。"
      operationId: "viewResourceBySignedUrl"
      tags:
        - "Share"
      security: []
      parameters:
        - $ref: "#/components/parameters/ResourceIdPath"
        - name: token
          in: query
          required: true
          description: "签名 URL token"
          schema:
            type: string
        - name: page
          in: query
          description: "页码"
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ResourceContent"
        "400":
          description: "token 缺失或格式错误"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "410":
          description: "链接已过期"

  # ---------------------------------------------------------------------------
  # Shared access
  # ---------------------------------------------------------------------------
  /api/v1/shared-access:
    get:
      summary: "列出当前 Organization 的 shared access 记录"
      description: "返回当前 organization 下创建的 shared access 列表，支持按 resource 过滤。"
      operationId: "listSharedAccess"
      tags:
        - "Share"
      parameters:
        - name: resource_id
          in: query
          description: "按资源 ID 过滤"
          schema:
            type: string
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSharedAccessResponse"

    post:
      summary: "创建 shared access"
      description: "为指定资源创建一个可公开访问的 signed URL。"
      operationId: "createSharedAccess"
      tags:
        - "Share"
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSharedAccessRequest"
      responses:
        "201":
          description: "创建成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SharedAccess"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/v1/shared-access/{shared_access_id}:
    parameters:
      - $ref: "#/components/parameters/SharedAccessIdPath"

    get:
      summary: "获取 shared access 详情"
      operationId: "getSharedAccess"
      tags:
        - "Share"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SharedAccess"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      summary: "撤销 shared access"
      operationId: "revokeSharedAccess"
      tags:
        - "Share"
      responses:
        "204":
          description: "撤销成功"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ---------------------------------------------------------------------------
  # Webhook
  # ---------------------------------------------------------------------------
  /api/v1/webhooks:
    get:
      summary: "列出 Webhook 订阅"
      operationId: "listWebhooks"
      tags:
        - "Webhook"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Webhook"

    post:
      summary: "创建 Webhook 订阅"
      operationId: "createWebhook"
      tags:
        - "Webhook"
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: "创建成功"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/Webhook"

# =============================================================================
# 组件定义
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # 认证方案
  # ---------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT Bearer Token"

    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "服务间调用或机器用户 API Key，通过 X-API-Key 请求头传递"

  # ---------------------------------------------------------------------------
  # Schema
  # ---------------------------------------------------------------------------
  schemas:
    # ---- 通用 ----
    BaseResponse:
      type: object
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          example: "ok"
        message:
          type: string
          example: "success"
        request_id:
          type: string
          example: "req_xxxxxxxxxxxx"

    Pagination:
      type: object
      required:
        - page
        - page_size
        - total
        - has_more
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        has_more:
          type: boolean
          example: true

    # ---- Organization ----
    Organization:
      type: object
      required:
        - id
        - name
        - slug
        - role
        - created_at
      properties:
        id:
          type: string
          example: "org_xxxxxxxxxxxx"
        name:
          type: string
          example: "{公司名}"
        slug:
          type: string
          example: "{组织标识}"
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - public
          example: "owner"
        settings:
          type: object
          example:
            theme: "light"
        created_at:
          type: string
          format: date-time
          example: "2026-06-18T15:20:42Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-06-18T15:20:42Z"

    CreateOrganizationRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "{公司名}"
        slug:
          type: string
          pattern: "^[a-z0-9][a-z0-9_-]{0,62}[a-z0-9]$"
          minLength: 2
          maxLength: 64
          example: "{组织标识}"

    UpdateOrganizationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "{公司名}"
        settings:
          type: object

    ListOrganizationsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Organization"
            pagination:
              $ref: "#/components/schemas/Pagination"

    # ---- Resource ----
    Resource:
      type: object
      required:
        - id
        - organization_id
        - title
        - status
        - created_at
      properties:
        id:
          type: string
          example: "doc_xxxxxxxxxxxx"
        organization_id:
          type: string
          example: "org_xxxxxxxxxxxx"
        title:
          type: string
          example: "Q2 Financial Report"
        status:
          type: string
          enum:
            - draft
            - processing
            - active
            - archived
          example: "active"
        page_count:
          type: integer
          example: 12
        metadata:
          type: object
          example:
            author: "John Doe"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateResourceRequest:
      type: object
      required:
        - title
        - file_name
        - file_size
      properties:
        title:
          type: string
          maxLength: 500
          example: "Q2 Financial Report"
        file_name:
          type: string
          example: "q2-report.pdf"
        file_size:
          type: integer
          description: "文件大小（字节）"
          example: 1048576
        file_type:
          type: string
          example: "pdf"

    ResourceWithUploadURL:
      allOf:
        - $ref: "#/components/schemas/Resource"
        - type: object
          properties:
            upload_url:
              type: string
              format: uri
              example: "https://oss.example.com/upload/xxx?signature=yyy"
            upload_method:
              type: string
              example: "PUT"
            upload_headers:
              type: object
              example:
                Content-Type: "application/pdf"

    ListResourcesResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Resource"
            pagination:
              $ref: "#/components/schemas/Pagination"

    ResourceContent:
      type: object
      required:
        - resource_id
        - page_number
      properties:
        resource_id:
          type: string
        page_number:
          type: integer
        content_type:
          type: string
          enum: [image, text, pdf, html, unknown]
          example: "text"
          description: "内容类型"
        content_url:
          type: string
          format: uri
          description: "当内容以外部资源形式存储时的 URL"
        text_content:
          type: string
          description: "纯文本或 OCR 文本内容"
        metadata:
          type: object
          additionalProperties: true
          description: "页面或块级元数据（如 OCR 置信度、尺寸、来源等）"

    # ---- Shared access ----
    SharedAccess:
      type: object
      required:
        - id
        - resource_id
        - organization_id
        - access_url
        - expires_at
        - created_at
      properties:
        id:
          type: string
          example: "sa_xxxxxxxxxxxx"
        resource_id:
          type: string
          example: "doc_xxxxxxxxxxxx"
        organization_id:
          type: string
          example: "org_xxxxxxxxxxxx"
        access_url:
          type: string
          format: uri
          example: "https://api.example.com/public/resources/doc_xxx?token=signed_token"
        expires_at:
          type: string
          format: date-time
          example: "2026-07-18T15:20:42Z"
        created_at:
          type: string
          format: date-time

    CreateSharedAccessRequest:
      type: object
      required:
        - resource_id
      properties:
        resource_id:
          type: string
          example: "doc_xxxxxxxxxxxx"
        expires_in_seconds:
          type: integer
          description: "有效期（秒），默认 7 天"
          example: 604800
        allow_download:
          type: boolean
          description: "是否允许下载"
          example: true

    ListSharedAccessResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/SharedAccess"
            pagination:
              $ref: "#/components/schemas/Pagination"

    # ---- Webhook ----
    Webhook:
      type: object
      required:
        - id
        - url
        - events
        - created_at
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        created_at:
          type: string
          format: date-time

    CreateWebhookRequest:
      type: object
      required:
        - url
        - events
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum:
              - resource.created
              - resource.processed
              - link.accessed

    # ---- 错误 ----
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        issue:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          example: "invalid_request"
        message:
          type: string
          example: "Invalid request parameters"
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
        request_id:
          type: string

  # ---------------------------------------------------------------------------
  # 公共响应
  # ---------------------------------------------------------------------------
  responses:
    BadRequestError:
      description: "请求参数错误"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "invalid_request"
            message: "Invalid request parameters"
            details:
              - field: "email"
                issue: "invalid_format"
            request_id: "req_xxx"

    UnauthorizedError:
      description: "未认证或 token 无效"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "unauthorized"
            message: "Authentication required"
            request_id: "req_xxx"

    ForbiddenError:
      description: "无权限访问该资源"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "forbidden"
            message: "Access denied"
            request_id: "req_xxx"

    NotFoundError:
      description: "资源不存在"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "not_found"
            message: "Resource not found"
            request_id: "req_xxx"

    ConflictError:
      description: "资源冲突"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "slug_taken"
            message: "Organization slug is already taken"
            request_id: "req_xxx"

    RateLimitError:
      description: "请求过于频繁"
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "rate_limited"
            message: "Too many requests"
            request_id: "req_xxx"

  # ---------------------------------------------------------------------------
  # 公共请求头/参数
  # ---------------------------------------------------------------------------
  parameters:
    OrganizationIdPath:
      name: organization_id
      in: path
      required: true
      description: "Organization 唯一标识"
      schema:
        type: string
        example: "org_xxxxxxxxxxxx"

    ResourceIdPath:
      name: resource_id
      in: path
      required: true
      description: "资源唯一标识"
      schema:
        type: string
        example: "doc_xxxxxxxxxxxx"

    SharedAccessIdPath:
      name: shared_access_id
      in: path
      required: true
      description: "Shared access 唯一标识"
      schema:
        type: string
        example: "sa_xxxxxxxxxxxx"

    PageQuery:
      name: page
      in: query
      description: "页码，从 1 开始"
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1

    PageSizeQuery:
      name: page_size
      in: query
      description: "每页数量"
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
        example: 20

    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: false
      description: "幂等键，用于防止重复提交"
      schema:
        type: string

# =============================================================================
# Webhook 事件定义
# =============================================================================
webhooks:
  resource.created:
    post:
      summary: "资源创建事件"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: "resource.created"
                timestamp:
                  type: string
                  format: date-time
                data:
                  $ref: "#/components/schemas/Resource"
      responses:
        "200":
          description: "成功接收"

  resource.processed:
    post:
      summary: "资源处理完成事件"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: "resource.processed"
                timestamp:
                  type: string
                  format: date-time
                data:
                  $ref: "#/components/schemas/Resource"
      responses:
        "200":
          description: "成功接收"

# =============================================================================
# 外部文档
# =============================================================================
externalDocs:
  description: "更多 API 文档与 SDK"
  url: "https://developers.example.com"
