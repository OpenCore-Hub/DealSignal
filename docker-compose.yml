services:
  postgres:
    image: postgres:16-alpine
    container_name: dealsignal-postgres
    environment:
      POSTGRES_USER: dealsignal
      POSTGRES_PASSWORD: dealsignal
      POSTGRES_DB: dealsignal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealsignal -d dealsignal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
