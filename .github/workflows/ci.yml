name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    name: Frontend validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          package_json_file: apps/web/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: apps/web/coverage

  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          cache-dependency-path: apps/api/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: apps/api/coverage.out

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          cache-dependency-path: apps/api/go.sum

      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./... --timeout=5m

  backend-security:
    name: Backend security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          cache-dependency-path: apps/api/go.sum

      - name: govulncheck
        run: make security

  frontend-e2e:
    name: Frontend E2E (real backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          package_json_file: apps/web/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Ensure docker-compose binary
        run: |
          if ! command -v docker-compose &> /dev/null; then
            echo 'docker compose "$@"' | sudo tee /usr/local/bin/docker-compose > /dev/null
            sudo chmod +x /usr/local/bin/docker-compose
          fi

      - name: Prepare API env
        working-directory: apps/api
        run: |
          cp .env.example .env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET=ci-jwt-secret/' .env
          sed -i 's/^OPENAI_API_KEY=.*/OPENAI_API_KEY=/' .env

      - name: Start backend services
        working-directory: apps/api
        run: docker-compose up -d

      - name: Wait for API
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:8080/healthz && exit 0
            sleep 2
          done
          exit 1

      - name: Run E2E tests
        run: pnpm test:e2e:real

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure docker-compose binary
        run: |
          if ! command -v docker-compose &> /dev/null; then
            echo 'docker compose "$@"' | sudo tee /usr/local/bin/docker-compose > /dev/null
            sudo chmod +x /usr/local/bin/docker-compose
          fi

      - name: Prepare env
        run: |
          cp .env.example .env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET=ci-jwt-secret/' .env
          sed -i 's/^OPENAI_API_KEY=.*/OPENAI_API_KEY=/' .env

      - name: Start services
        run: docker-compose up -d

      - name: Wait for API
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:8080/healthz && exit 0
            sleep 2
          done
          exit 1

      - name: Run backend E2E
        run: PDF=../web/e2e/fixtures/sample.pdf ./e2e-test.sh

      - name: Tear down
        if: always()
        run: docker-compose down

  frontend-e2e-real:
    name: Frontend real-backend E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure docker-compose binary
        run: |
          if ! command -v docker-compose &> /dev/null; then
            echo 'docker compose "$@"' | sudo tee /usr/local/bin/docker-compose > /dev/null
            sudo chmod +x /usr/local/bin/docker-compose
          fi

      - name: Prepare backend env
        run: |
          cp apps/api/.env.example apps/api/.env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET=ci-jwt-secret/' apps/api/.env
          sed -i 's/^OPENAI_API_KEY=.*/OPENAI_API_KEY=/' apps/api/.env

      - name: Start backend
        run: cd apps/api && docker-compose up -d

      - name: Wait for API
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:8080/healthz && exit 0
            sleep 2
          done
          exit 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          package_json_file: apps/web/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd apps/web && pnpm exec playwright install --with-deps chromium

      - name: Run real-backend E2E
        run: cd apps/web && ./e2e-real-backend.sh

      - name: Tear down backend
        if: always()
        run: cd apps/api && docker-compose down

  docker-push-api:
    name: Build and push API Docker image
    runs-on: ubuntu-latest
    needs: [frontend, backend-test, backend-lint, backend-security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/api
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${IMAGE_NAME}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push-web:
    name: Build and push web Docker image
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/web
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${IMAGE_NAME}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [docker-push-api, docker-push-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.STAGING_HOST != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_COMPOSE_PATH != ''
    environment: staging
    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to staging via SSH
        env:
          STAGING_USER: ${{ secrets.STAGING_USER || 'deploy' }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_COMPOSE_PATH: ${{ secrets.STAGING_COMPOSE_PATH }}
          API_IMAGE: ${{ needs.docker-push-api.outputs.image_name }}:${{ github.sha }}
          WEB_IMAGE: ${{ needs.docker-push-web.outputs.image_name }}:${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${STAGING_USER}@${STAGING_HOST}" \
            "cd ${STAGING_COMPOSE_PATH} && \
             docker pull ${API_IMAGE} && \
             docker pull ${WEB_IMAGE} && \
             API_IMAGE=${API_IMAGE} WEB_IMAGE=${WEB_IMAGE} docker compose up -d"
