services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?postgres user required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:?postgres db required}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    # Pinned to a concrete Redis 7.4 patch release.
    image: redis:7
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9003:9000"
      - "9004:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - minio_data:/data

  minio-init:
    # Re-use the pinned MinIO image; it ships the mc CLI at /usr/bin/mc.
    image: minio/minio:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      /usr/bin/mc mb local/$${S3_BUCKET} || true &&
      /usr/bin/mc anonymous set download local/$${S3_BUCKET}
      "

  onlyoffice:
    # Pinned to a stable ONLYOFFICE Document Server release. Review upstream security advisories
    # before bumping, as major versions may require connector updates.
    image: onlyoffice/documentserver:8.3.3
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
    ports:
      - "8085:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      VERSION: ${VERSION:-v2.1.2}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE}
      ONLYOFFICE_URL: ${ONLYOFFICE_URL}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      VIEWER_BASE_URL: ${VIEWER_BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@dealsignal.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@dealsignal.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      RATE_LIMIT_PUBLIC_RPM: ${RATE_LIMIT_PUBLIC_RPM:-100}
      RATE_LIMIT_AUTH_RPM: ${RATE_LIMIT_AUTH_RPM:-20}
      RATE_LIMIT_UPLOAD_RPM: ${RATE_LIMIT_UPLOAD_RPM:-10}
      RATE_LIMIT_WORKSPACE_RPM: ${RATE_LIMIT_WORKSPACE_RPM:-200}
      IDEMPOTENCY_TTL_HOURS: ${IDEMPOTENCY_TTL_HOURS:-24}
      IDEMPOTENCY_MAX_BODY_SIZE: ${IDEMPOTENCY_MAX_BODY_SIZE:-1048576}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      PPROF_ENABLED: ${PPROF_ENABLED:-false}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      onlyoffice:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  onlyoffice_data:
